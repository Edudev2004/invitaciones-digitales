<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Invitación Leah Kelahny - ¡Mi Primer Añito!</title>
    
    <!-- Fuentes de Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pangolin&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Librería de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="assets/js/config.js"></script>
    
    <!-- Mis estilos personalizados -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="watercolor-bg text-on-surface font-body overflow-x-hidden">
    <!-- Objetos flotantes del fondo -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-10 -left-10 w-48 h-48 bg-nursery-pink/20 rounded-full blur-3xl animate-drift"></div>
        <div class="absolute top-1/2 -right-20 w-64 h-64 bg-nursery-mint/20 rounded-full blur-3xl animate-drift" style="animation-delay: -5s;"></div>
        
        <!-- Nubes decorativas en SVG -->
        <svg class="absolute top-20 left-10 w-32 h-20 opacity-40 animate-float" viewBox="0 0 24 24" fill="#ffffff">
            <path d="M17.5,19c-3.03,0-5.5-2.47-5.5-5.5c0-0.34,0.03-0.67,0.09-1c-1.48-0.89-2.49-2.51-2.49-4.5c0-2.21,1.79-4,4-4 c0.54,0,1.04,0.11,1.5,0.3c0.75-0.8,1.83-1.3,3-1.3c2.21,0,4,1.79,4,4c0,0.54-0.11,1.04-0.3,1.5c1.4,0.78,2.3,2.27,2.3,4 c0,2.48-2.02,4.5-4.5,4.5H17.5z"/>
        </svg>
        <svg class="absolute top-60 right-20 w-24 h-16 opacity-30 animate-float" style="animation-delay: -2s;" viewBox="0 0 24 24" fill="#ffffff">
            <path d="M17.5,19c-3.03,0-5.5-2.47-5.5-5.5c0-0.34,0.03-0.67,0.09-1c-1.48-0.89-2.49-2.51-2.49-4.5c0-2.21,1.79-4,4-4 c0.54,0,1.04,0.11,1.5,0.3c0.75-0.8,1.83-1.3,3-1.3c2.21,0,4,1.79,4,4c0,0.54-0.11,1.04-0.3,1.5c1.4,0.78,2.3,2.27,2.3,4 c0,2.48-2.02,4.5-4.5,4.5H17.5z"/>
        </svg>
    </div>

    <main class="relative z-10 min-h-screen px-6 pt-12 pb-24 max-w-lg mx-auto overflow-hidden">
        <!-- Sección de bienvenida -->
        <header class="text-center mb-12">
            <div class="relative inline-block mb-10 pt-8">
                <!-- Adornos alrededor de la foto -->
                <span class="material-symbols-outlined absolute -top-2 -left-6 text-nursery-pink scale-150 animate-float opacity-60">flare</span>
                <span class="material-symbols-outlined absolute bottom-0 -right-4 text-nursery-mint scale-125 animate-pulse opacity-60">eco</span>
                <span class="material-symbols-outlined absolute -top-6 right-10 text-nursery-gold scale-110 animate-bounce opacity-50">auto_awesome</span>
                
                <!-- Marco principal de la foto -->
                <div class="relative">
                    <div class="w-72 h-72 mx-auto blob-mask bg-white p-3 shadow-[0_20px_50px_rgba(118,94,97,0.15)] relative overflow-hidden ring-8 ring-white/50">
                        <div class="w-full h-full blob-mask overflow-hidden bg-nursery-cream">
                            <!-- Foto real de la bebé Leah -->
                            <img src="assets/images/Leah.jpeg" 
                                 alt="Foto de Leah" 
                                 class="w-full h-full object-cover">
                        </div>
                    </div>

                    <!-- Ilustración del osito acuarela -->
                    <div class="absolute -bottom-10 -right-6 w-40 h-40 z-20 animate-float" style="animation-delay: -1s;">
                        <img src="assets/images/osito.png" 
                             alt="Oso acuarela" 
                             class="w-full h-full object-contain"
                             onerror="this.src='https://img.freepik.com/premium-vector/cute-baby-bear-watercolor-illustration_254685-364.jpg'">
                    </div>
                </div>
                
                <!-- Una nubecita extra de fondo -->
                <div class="absolute -bottom-6 -left-10 w-24 h-12 bg-white/40 backdrop-blur-sm rounded-full animate-drift opacity-80" style="animation-duration: 15s;"></div>
            </div>
            
            <h1 class="font-headline text-6xl text-primary leading-tight mb-2 tracking-wide drop-shadow-sm">
                Leah Kelahny
            </h1>
            <p class="text-on-surface-variant font-medium text-xl italic opacity-80">¡Te invito a mi fiesta mágica!</p>
        </header>

        <!-- Datos del evento (Fecha, Hora y Lugar) -->
        <section class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/60 backdrop-blur-sm p-6 rounded-2xl shadow-sm border border-white/40 flex flex-col items-center text-center">
                    <div class="w-12 h-12 bg-nursery-pink rounded-full flex items-center justify-center mb-3 text-white shadow-inner">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
                    </div>
                    <span class="font-headline text-primary block text-sm">Miércoles</span>
                    <span class="text-xl font-bold text-on-surface">15 Abril</span>
                </div>
                <div class="bg-white/60 backdrop-blur-sm p-6 rounded-2xl shadow-sm border border-white/40 flex flex-col items-center text-center">
                    <div class="w-12 h-12 bg-nursery-mint rounded-full flex items-center justify-center mb-3 text-secondary shadow-inner">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">schedule</span>
                    </div>
                    <span class="font-headline text-secondary block text-sm">Horario</span>
                    <span class="text-xl font-bold text-on-surface">6:00 PM</span>
                </div>
            </div>

            <!-- Tarjeta de ubicación -->
            <div class="bg-white/80 backdrop-blur-md p-8 rounded-[2.5rem] shadow-lg border border-white relative overflow-hidden">
                <div class="flex items-start gap-4 relative z-10">
                    <div class="w-14 h-14 bg-nursery-gold/20 rounded-full flex items-center justify-center text-nursery-gold flex-shrink-0 animate-float">
                        <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
                    </div>
                    <div>
                        <h3 class="font-headline text-2xl text-primary mb-1">¿Dónde será?</h3>
                        <p class="text-on-surface text-lg">Jr. Pasco 4045</p>
                        <p class="text-sm text-on-surface-variant italic">(Alt. cdra 40 Av. Perú)</p>
                    </div>
                </div>
                <!-- Nube pequeña decorativa -->
                <span class="material-symbols-outlined absolute -bottom-4 -right-2 text-nursery-mint/20 text-7xl">cloud</span>
            </div>
        </section>

        <!-- Botones de acción rediseñados (Estilo burbuja tierna) -->
        <section class="mt-12 space-y-6">
            <a href="https://maps.google.com/?q=Jr.+Pasco+4045,+Lima" target="_blank" 
               class="relative flex items-center justify-center gap-3 w-full py-5 px-8 bg-gradient-to-r from-nursery-pink to-[#F8C8CC] text-on-primary-container rounded-3xl font-headline text-2xl shadow-[0_10px_25px_rgba(250,218,221,0.6)] border-4 border-white hover:scale-[1.03] active:scale-95 transition-all duration-300 group">
                <span class="material-symbols-outlined text-3xl group-hover:rotate-12 transition-transform">map</span>
                Ver Ubicación
                <!-- Adorno de brillo en el botón -->
                <span class="absolute top-1 left-4 w-12 h-1 bg-white/30 rounded-full"></span>
            </a>

            <a href="https://wa.me/51900000000?text=Hola!%20Confirmo%20asistencia%20al%20cumple%20de%20Leah" 
               class="relative flex items-center justify-center gap-3 w-full py-5 px-8 bg-gradient-to-r from-nursery-mint to-[#D0F5F5] text-secondary rounded-3xl font-headline text-2xl shadow-[0_10px_25px_rgba(224,255,255,0.6)] border-4 border-white hover:scale-[1.03] active:scale-95 transition-all duration-300 animate-pulse-soft group">
                <span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform">chat</span>
                Confirmar Asistencia
                <!-- Adorno de brillo en el botón -->
                <span class="absolute top-1 left-4 w-12 h-1 bg-white/30 rounded-full"></span>
            </a>
        </section>

        <!-- Pie de página -->
        <footer class="mt-16 text-center">
            <p class="font-headline text-primary/60 text-lg">¡No faltes a esta dulce aventura!</p>
            <div class="mt-8 flex justify-center gap-4">
                 <div class="w-4 h-4 rounded-full bg-nursery-pink animate-bounce" style="animation-delay: 0s;"></div>
                 <div class="w-4 h-4 rounded-full bg-nursery-mint animate-bounce" style="animation-delay: 0.2s;"></div>
                 <div class="w-4 h-4 rounded-full bg-nursery-gold animate-bounce" style="animation-delay: 0.4s;"></div>
            </div>
        </footer>
    </main>

    <!-- Barra de navegación inferior decorativa -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/90 backdrop-blur-xl h-20 rounded-t-[3rem] shadow-[0_-10px_30px_rgba(0,0,0,0.05)] flex justify-around items-center px-6 z-50">
        <button class="flex flex-col items-center gap-1 text-primary">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">cake</span>
            <span class="text-[10px] font-bold uppercase tracking-widest">Inicio</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-on-surface-variant/40">
            <span class="material-symbols-outlined">map</span>
            <span class="text-[10px] font-bold uppercase tracking-widest">Mapa</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-on-surface-variant/40">
            <span class="material-symbols-outlined">favorite</span>
            <span class="text-[10px] font-bold uppercase tracking-widest">RSVP</span>
        </button>
    </nav>
</body>
</html>
